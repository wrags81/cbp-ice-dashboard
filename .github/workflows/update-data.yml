name: Weekly Data Update

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC (3am ET)
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest FY2026 data
        run: python3 fetch_and_build.py 2026

      - name: Fetch latest FY2025 data
        run: python3 fetch_and_build.py 2025

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Auto-update data $(date +'%Y-%m-%d')"
            git push
          fi
